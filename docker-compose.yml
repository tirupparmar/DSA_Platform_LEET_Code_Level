version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: algosim-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: algosim
    ports:
      - '5432:5432'
    volumes:
      - algosim-pgdata:/var/lib/postgresql/data

volumes:
  algosim-pgdata:
